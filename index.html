<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chow~Sho!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Gugi&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exile&display=swap" rel="stylesheet">      
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
              gugi: ['Gugi', 'cursive'],
              exile: ['Exile', 'system-ui'],
            },
            colors: {
              brand: {
                red: '#FF4500', // OrangeRed
                yellow: '#FFD700', // Gold
                dark: '#2D2D2D',
                light: '#FFF8E1', // Cornsilk
              }
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideDown: {
                '0%': { transform: 'translateY(-100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'slide-down': 'slideDown 0.3s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #FF4500;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cc3700;
      }

      .exile-regular {
        font-family: "Exile", system-ui;
        font-weight: 400;
        font-style: normal;
      }
    </style>
  <script type="importmap">
{
  "imports": {

    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "react-share": "https://esm.sh/react-share@5.1.0?external=react",
    "motion": "https://esm.sh/motion@^12.38.0?external=react",
    "motion/react": "https://esm.sh/motion@^12.38.0/react?external=react"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
